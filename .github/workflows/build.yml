name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
    
    - name: Run tests
      run: go test ./...
    
    - name: Build for Linux
      env:
        GOOS: linux
        GOARCH: amd64
      run: go build -o mqtt_consumer_db ./main.go
    
    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: mqtt_consumer_db
        path: mqtt_consumer_db
