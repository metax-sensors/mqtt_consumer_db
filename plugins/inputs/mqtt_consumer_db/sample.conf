## First instance
[[inputs.mqtt_consumer_db]]
  db_server = "localhost:5432"
  db_name = "telegraf"
  db_username = "telegraf"
  db_password = "telegraf"
  server_id = "server1"

  ## Input data format: MQTT payloads are parsed as float values.
  ## Each message payload should contain a single float number (e.g. "23.5").

  [inputs.mqtt_consumer_db.mqtt_consumer]
    servers = ["tcp://127.0.0.1:1883"]
    connection_timeout = "30s"
    # client_id = ""
    # qos = 0
    # persistent_session = false
    # username = "telegraf"
    # password = "metricsmetricsmetricsmetrics"

